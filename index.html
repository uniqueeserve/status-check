<!DOCTYPE html>
<html>
<head>
<title>Unique eServe - Status Check</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #4facfe, #00f2fe);
  margin: 0;
  padding: 0;
}

.container {
  max-width: 400px;
  margin: 60px auto;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  text-align: center;
}

.logo {
  width: 220px;
  max-width: 100%;
  margin-bottom: 15px;
}

input {
  width: 85%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  width: 90%;
  padding: 10px;
  margin-top: 5px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.reset-btn {
  background: #28a745;
}

.captcha {
  font-weight: bold;
  margin: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th {
  background: #007bff;
  color: white;
  padding: 8px;
}

td {
  padding: 8px;
  background: #f1f8ff;
  border-bottom: 1px solid #ddd;
}

.error {
  color: red;
  margin-top: 15px;
}

.success {
  color: green;
}
</style>
</head>

<body>

<div class="container">

<img src="https://blogger.googleusercontent.com/img/a/AVvXsEiDR011dznsKlAGLWaRNIaLFfOf1RB8ZiTUVgchjj-TcNcHZgpdPHqZadc26Kuvi_-vHIvMwvUJAJU1UhDcAXA-A0T7VoUaV5mSFh-z0c6-pRDTVIRAZDjuITKoR0XER07rm5V2pOTEqYtbVWx_NxLKD09uQmihyKqJxg9whb4fN7UPaFCsDSvNemtovhQ=s821" class="logo">

<h3>Application Status Check</h3>

<input type="text" id="appNo" placeholder="Enter Application No">
<input type="text" id="dob" placeholder="Enter DOB (DD-MM-YYYY)">

<div class="captcha" id="captchaText"></div>
<input type="text" id="captchaInput" placeholder="Enter Captcha">

<button onclick="checkStatus()">Check Status</button>

<div id="result"></div>

</div>

<script>
let num1, num2;

// Generate captcha
function generateCaptcha() {
  num1 = Math.floor(Math.random() * 10);
  num2 = Math.floor(Math.random() * 10);
  document.getElementById("captchaText").innerHTML =
    "Solve: " + num1 + " + " + num2 + " = ?";
}

generateCaptcha();

function formatDate(dateString) {
  let d = new Date(dateString);
  let day = ("0" + d.getDate()).slice(-2);
  let month = ("0" + (d.getMonth() + 1)).slice(-2);
  let year = d.getFullYear();
  return day + "-" + month + "-" + year;
}

function resetForm() {
  document.getElementById("appNo").value = "";
  document.getElementById("dob").value = "";
  document.getElementById("captchaInput").value = "";
  document.getElementById("result").innerHTML = "";
  generateCaptcha();
}

function checkStatus() {

  let appNo = document.getElementById("appNo").value.trim();
  let dob = document.getElementById("dob").value.trim();
  let captchaValue = document.getElementById("captchaInput").value;

  if (parseInt(captchaValue) !== (num1 + num2)) {
    document.getElementById("result").innerHTML =
      "<div class='error'>❌ Wrong Captcha</div>";
    generateCaptcha();
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbwahQjzuP1RqkSjBqLBceY8nWpDUtvh2vF8TH-R26SoYwKpVDjrXBdWT5YF5d4sj-Dj/exec?appNo=" + appNo + "&dob=" + dob)
    .then(res => res.json())
    .then(data => {

      if (!data || data.status === "Invalid App No or DOB") {
        document.getElementById("result").innerHTML =
          "<div class='error'>❌ NO RESULT FOUND</div>";
      } else {

        document.getElementById("result").innerHTML =
          "<table>" +
          "<tr><th>Field</th><th>Details</th></tr>" +
          "<tr><td>Client Name</td><td>" + data.name + "</td></tr>" +
          "<tr><td>Service</td><td>" + data.service + "</td></tr>" +
          "<tr><td>Service Type</td><td>" + data.serviceType + "</td></tr>" +
          "<tr><td>Application No</td><td>" + data.serviceAppNo + "</td></tr>" +
          "<tr><td>Status</td><td class='success'><b>" + data.status + "</b></td></tr>" +
          "<tr><td>Date</td><td>" + formatDate(data.date) + "</td></tr>" +
          "</table>" +
          "<button class='reset-btn' onclick='resetForm()'>Check Another</button>";
      }

      generateCaptcha();
    })
    .catch(() => {
      document.getElementById("result").innerHTML =
        "<div class='error'>⚠️ Server Error</div>";
    });
}
</script>

</body>
</html>
