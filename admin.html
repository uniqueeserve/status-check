<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Unique eServe</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #4facfe, #00f2fe);
  margin: 0;
}

.container {
  max-width: 420px;
  margin: 60px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h3 {
  text-align: center;
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  display: block;
  margin-top: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

.msg {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h3>Admin Panel</h3>

<label>Application No</label>
<input id="appNo">

<label>Status</label>
<select id="status">
  <option value="">-- Select Status --</option>
  <option value="Submitted">Submitted</option>
  <option value="Processing">Processing</option>
  <option value="Completed">Completed</option>
</select>

<label>Tracking ID (PAN only)</label>
<input id="trackingId">

<label>Tracking Remarks</label>
<textarea id="trackingRemarks"></textarea>

<label>General Remark</label>
<textarea id="remark"></textarea>

<button onclick="updateStatus()">Update Status</button>

<div id="msg" class="msg"></div>

</div>

<script>
function updateStatus() {

  let data = {
    appNo: document.getElementById("appNo").value.trim(),
    status: document.getElementById("status").value.trim(),
    trackingId: document.getElementById("trackingId").value.trim(),
    trackingRemarks: document.getElementById("trackingRemarks").value.trim(),
    remark: document.getElementById("remark").value.trim()
  };

  if (!data.appNo) {
    document.getElementById("msg").innerHTML = "❌ Enter Application No";
    return;
  }

  // remove empty fields (SMART UPDATE)
  Object.keys(data).forEach(key => {
    if (!data[key]) delete data[key];
  });

  fetch("https://script.google.com/macros/s/AKfycbwahQjzuP1RqkSjBqLBceY8nWpDUtvh2vF8TH-R26SoYwKpVDjrXBdWT5YF5d4sj-Dj/exec", {
    method: "POST",
    mode: "no-cors",   // ⭐ Fix for error
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    document.getElementById("msg").innerHTML = "✅ Updated Successfully";

    // optional reset
    document.getElementById("status").value = "";
    document.getElementById("trackingId").value = "";
    document.getElementById("trackingRemarks").value = "";
    document.getElementById("remark").value = "";
  })
  .catch(() => {
    document.getElementById("msg").innerHTML = "❌ Error updating";
  });
}
</script>

</body>
</html>
