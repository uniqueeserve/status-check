<!DOCTYPE html>
<html>
<head>
<title>Unique eServe - Services</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #4facfe, #00f2fe);
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 20px auto;
  text-align: center;
}

.logo {
  width: 200px;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: linear-gradient(135deg, #007bff, #00c6ff);
  color: white;
  border-radius: 18px;
  padding: 25px;
  height: 190px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
}

.card img {
  width: 60px;
  background: white;
  padding: 8px;
  border-radius: 10px;
}

/* BUTTON */
.btn {
  background: linear-gradient(45deg, #fff, #dff6ff);
  color: #007bff;
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
}

.popup-content {
  background: white;
  width: 90%;
  max-width: 380px;
  margin: 60px auto;
  padding: 20px;
  border-radius: 15px;
  position: relative;
  text-align: center;
}

.close {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
}

.form-group {
  width: 90%;
  margin: 8px auto;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.submit-btn {
  width: 90%;
  margin: 10px auto;
  padding: 10px;
  background: linear-gradient(45deg, #007bff, #00c6ff);
  color: white;
  border: none;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
}

.success {
  text-align:center;
  color:green;
  font-weight:bold;
}

@media(max-width:768px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<img src="https://blogger.googleusercontent.com/img/a/AVvXsEiDR011dznsKlAGLWaRNIaLFfOf1RB8ZiTUVgchjj-TcNcHZgpdPHqZadc26Kuvi_-vHIvMwvUJAJU1UhDcAXA-A0T7VoUaV5mSFh-z0c6-pRDTVIRAZDjuITKoR0XER07rm5V2pOTEqYtbVWx_NxLKD09uQmihyKqJxg9whb4fN7UPaFCsDSvNemtovhQ=s821" class="logo">

<h2 style="color:white;">Our Services</h2>

<div class="grid">

<div class="card">
<img src="https://img.icons8.com/color/96/fingerprint.png">
<h3>Aadhaar</h3>
<button class="btn" onclick="openForm('Aadhaar')">Get Service</button>
</div>

<div class="card">
<img src="https://img.icons8.com/color/96/id-verified.png">
<h3>PAN</h3>
<button class="btn" onclick="openForm('PAN')">Get Service</button>
</div>

<div class="card">
<img src="https://img.icons8.com/color/96/identification-documents.png">
<h3>Voter ID</h3>
<button class="btn" onclick="openForm('Voter ID')">Get Service</button>
</div>

<div class="card">
<img src="https://img.icons8.com/color/96/car--v1.png">
<h3>Driving License</h3>
<button class="btn" onclick="openForm('Driving License')">Get Service</button>
</div>

<div class="card">
<img src="https://img.icons8.com/color/96/certificate.png">
<h3>TN eSevai Certificate</h3>
<button class="btn" onclick="openForm('Certificate')">Get Service</button>
</div>

<div class="card">
<img src="https://img.icons8.com/color/96/passport.png">
<h3>Passport</h3>
<button class="btn" onclick="openForm('Passport')">Get Service</button>
</div>

<div class="card">
<img src="https://img.icons8.com/color/96/identity-theft.png">
<h3>Ration Card</h3>
<button class="btn" onclick="openForm('Ration Card')">Get Service</button>
</div>

<div class="card">
<img src="https://img.icons8.com/color/96/student-male.png">
<h3>Exams</h3>
<button class="btn" onclick="openForm('Exams')">Get Service</button>
</div>

</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">

<span class="close" onclick="closeForm()">❌</span>

<h3>Service Request</h3>

<div class="form-group"><input placeholder="Name *" id="name"></div>
<div class="form-group"><input placeholder="Phone Number *" id="phone"></div>
<div class="form-group"><input placeholder="Email ID *" id="email"></div>
<div class="form-group"><input id="service" readonly></div>
<div class="form-group"><select id="subcategory"></select></div>
<div class="form-group"><textarea placeholder="Comments *" id="comments"></textarea></div>

<button class="submit-btn" onclick="submitForm()">Submit</button>

<div id="successMsg" class="success" style="display:none;">
Thank you for choosing our service. We will contact you shortly.
</div>

</div>
</div>

<script>

const subServices = {
"Aadhaar": ["Address Change","Aadhaar Reprint","Other Related Service"],
"PAN": ["New Pan Apply","Correction Existing Pan","Pan Card Reprint","Other Related Service"],
"Voter ID": ["New Voter ID Apply","Correction Existing Voter ID","Voter ID Reprint","Other Related Services"],
"Driving License": ["Apply Learner License","Apply Driving License","Other Related Services"],
"Certificate": ["Income Certificate","Nativity Certificate","Community / OBC Certificate","Other Related Services"],
"Passport": ["Apply New Passport","Renew Passport","PCC","Other Related Services"],
"Ration Card": ["Apply New Smart Card","Add / Remove Members","Reprint Smart Card","Other Related Services"],
"Exams": ["TNPSC Exams","UPSC Exams","Bank & Insurance Exams","SSC Exams","PSU Exams","Other Exams"]
};

function openForm(service){
  document.getElementById("popup").style.display="block";
  document.getElementById("service").value = service;

  let dropdown = document.getElementById("subcategory");
  dropdown.innerHTML = "";

  subServices[service].forEach(item=>{
    let option = document.createElement("option");
    option.text = item;
    dropdown.add(option);
  });
}

function closeForm(){
  document.getElementById("popup").style.display="none";
}

function submitForm(){

let nameVal = document.getElementById("name").value.trim();
let phoneVal = document.getElementById("phone").value.trim();
let emailVal = document.getElementById("email").value.trim();

if(!nameVal || !phoneVal || !emailVal){
  alert("Please fill all required fields");
  return;
}

let data = {
name: nameVal,
phone: phoneVal,
email: emailVal,
service: document.getElementById("service").value,
subcategory: document.getElementById("subcategory").value,
comments: document.getElementById("comments").value
};

// WORKING METHOD (no-cors)
fetch("https://script.google.com/macros/s/AKfycbzP7RbP3WNbu8CNziYBLESv8vmkMyguEFc6JQjyb3Np0Qg92b_FBnAtePlZvPiTGVaUzg/exec", {
  method: "POST",
  mode: "no-cors",
  body: JSON.stringify(data)
});

// SUCCESS UI
document.getElementById("successMsg").style.display="block";

// RESET FORM
document.getElementById("name").value = "";
document.getElementById("phone").value = "";
document.getElementById("email").value = "";
document.getElementById("comments").value = "";
document.getElementById("subcategory").selectedIndex = 0;

// CLOSE POPUP
setTimeout(closeForm, 2500);

}
<!-- deploy fix -->
</script>

</body>
</html>
